<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- MUST stay "default". "black-translucent" makes the iOS standalone PWA paint
         FULL-BLEED under the status bar; combined with the fixed/100dvh chat layout +
         interactive-widget=resizes-content it broke the keyboard handling — the input
         bar was cut off below the keyboard and a safe-area gap showed at the bottom
         (regression 2026-06-22, PWA-only — browser was fine). "default" keeps the web
         view inset below the status bar = the known-good behavior. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Favicons (relative paths). The 1 MB favicon.svg was removed — modern
         browsers preferred it, downloading it on every first visit. -->
    <link rel="icon" type="image/png" href="./favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="./favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Incognito Chat" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="canonical" href="https://konskall.github.io/incognitochat/" />

    <!-- Open Graph Tags -->
    <meta property="og:title" content="Incognito Chat - Speak Free">
    <meta property="og:description" content="Anonymous, private chat in PIN-locked rooms. No phone number or sign-up — share the room name and PIN to talk freely.">
    <meta property="og:image" content="https://konskall.github.io/incognitochat/og-incognito.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://konskall.github.io/incognitochat/">

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Incognito Chat - Speak Free">
    <meta name="twitter:description" content="Anonymous, private chat in PIN-locked rooms. No phone number or sign-up.">
    <meta name="twitter:image" content="https://konskall.github.io/incognitochat/og-incognito.jpg">

    <!-- LinkedIn reads standard Open Graph (og:*) above — no 'linkedin:*' namespace exists. -->

    <meta property="og:locale" content="en_US">
    <meta name="author" content="KonsKall">
    <title id="pageTitle">Incognito Chat — Anonymous, PIN-locked private chat rooms</title>
    <meta name="description" content="Anonymous, private chat in PIN-locked rooms. No phone number or sign-up — share the room name and PIN to talk freely." />

    <!-- Structured data for rich results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "Incognito Chat",
          "applicationCategory": "CommunicationApplication",
          "operatingSystem": "Web, iOS, Android",
          "url": "https://konskall.github.io/incognitochat/",
          "description": "Privacy-first, anonymous messaging in PIN-locked private rooms, with audio/video calls. No phone number or sign-up required. Installable as a PWA.",
          "browserRequirements": "Requires JavaScript. Requires a modern browser.",
          "offers": {
            "@type": "AggregateOffer",
            "priceCurrency": "EUR",
            "lowPrice": "0",
            "highPrice": "10",
            "offerCount": "3"
          },
          "author": { "@type": "Person", "name": "KonsKall" }
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Do I need an account to use Incognito Chat?",
              "acceptedAnswer": { "@type": "Answer", "text": "No. Just pick a username and a room — no phone number, email, or sign-up required. A Google login is optional, used to save your rooms and for paid plans." }
            },
            {
              "@type": "Question",
              "name": "Are my messages encrypted?",
              "acceptedAnswer": { "@type": "Answer", "text": "Messages are scrambled with your room's PIN, and only members who join with the correct PIN can read them. This is strong access control rather than end-to-end encryption — treat the PIN like a shared password." }
            },
            {
              "@type": "Question",
              "name": "What plans are available and what do they cost?",
              "acceptedAnswer": { "@type": "Answer", "text": "Incognito Chat is free to use. Basic (€5/month) unlocks 10 rooms, 100 messages per day per room, audio calls, room customization and disappearing messages. Ultra (€10/month) adds unlimited rooms and messages, video calls, screen sharing, the Inco AI assistant and 40MB uploads. You can cancel anytime from your dashboard." }
            },
            {
              "@type": "Question",
              "name": "How do the audio and video calls work?",
              "acceptedAnswer": { "@type": "Answer", "text": "Calls connect directly between participants (peer-to-peer) when the network allows, and fall back to a secure relay otherwise. Audio calls are available on Basic and Ultra; video calls and screen sharing are Ultra (screen sharing isn't available on iPhone or iPad)." }
            },
            {
              "@type": "Question",
              "name": "What is Inco, the AI assistant?",
              "acceptedAnswer": { "@type": "Answer", "text": "Inco is an in-room AI helper available on Ultra. Mention 'inco' in a message and it replies with answers and cited sources. Any signed-in member can switch it on or off for the room." }
            },
            {
              "@type": "Question",
              "name": "Can messages or rooms delete themselves?",
              "acceptedAnswer": { "@type": "Answer", "text": "Yes. On Basic and Ultra you can set messages to disappear on a timer, or have the entire room auto-delete after a chosen period. Free rooms also expire automatically 24 hours after they are created." }
            },
            {
              "@type": "Question",
              "name": "How large can my uploads be?",
              "acceptedAnswer": { "@type": "Answer", "text": "Up to 10MB per file on Free and Basic, and 40MB on Ultra. Images are compressed automatically to save data." }
            },
            {
              "@type": "Question",
              "name": "Will I be notified of new messages?",
              "acceptedAnswer": { "@type": "Answer", "text": "Yes — enable web push notifications (they work even when the app is closed; on iPhone, add the app to your Home Screen first) or per-room email alerts. Your message content is never sent to the email service." }
            },
            {
              "@type": "Question",
              "name": "What happens when a room is deleted?",
              "acceptedAnswer": { "@type": "Answer", "text": "Any member can delete the room. Deleting it permanently removes every message and shared file for everyone — there is no archive." }
            },
            {
              "@type": "Question",
              "name": "Can I install it on my phone?",
              "acceptedAnswer": { "@type": "Answer", "text": "Yes. It's a Progressive Web App — add it to your home screen from your browser to launch it like a native app, with optional push notifications." }
            }
          ]
        }
      ]
    }
    </script>

    <!-- Inter is self-hosted (see @font-face in index.css) — no third-party
         Google Fonts request on first paint. -->
    <!-- Warm up the avatar API origin (used on the login / dashboard / chat
         screens). Kept as dns-prefetch only so the landing — which has no
         avatars — doesn't open an unused connection. Previously these were
         trapped inside <noscript>, so they did nothing with JS enabled. -->
    <link rel="dns-prefetch" href="https://api.dicebear.com" />
    <!-- Preload the landing hero logo (LCP element). -->
    <link rel="preload" as="image" href="./favicon-96x96.png" fetchpriority="high" />
        <!-- PWA Install Prompt Capture - Must be before React loads -->
    <script>
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent the mini-infobar from appearing on mobile
        e.preventDefault();
        // Stash the event so it can be triggered later.
        window.deferredPrompt = e;
        // Dispatch a custom event so React knows it's ready
        window.dispatchEvent(new Event('pwa-ready'));
      });
    </script>
    <!-- Prevent White Flash on Load by Defaulting to Dark Mode -->
    <script>
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage))) {
        document.documentElement.classList.add('dark');
        document.querySelector("meta[name='theme-color']")?.setAttribute("content", "#020617");
      } else {
        document.documentElement.classList.remove('dark');
        document.querySelector("meta[name='theme-color']")?.setAttribute("content", "#f8fafc");
      }
    </script>
</head>
  <body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 antialiased selection:bg-primary-200 selection:text-primary-900">
    <div id="root" class="w-full"></div>
    <!-- Static fallback for non-JS text crawlers (Googlebot renders JS; head
         metadata + JSON-LD already cover indexing and social previews). -->
    <noscript>
      <div style="max-width:42rem;margin:3rem auto;padding:0 1.25rem;font-family:system-ui,sans-serif;line-height:1.6">
        <h1>Incognito Chat — anonymous, PIN-locked private chat rooms</h1>
        <p>Anonymous, private chat in PIN-locked rooms. No phone number or sign-up — share the room name and PIN to talk freely. Installable as a Progressive Web App, with optional audio/video calls. Incognito Chat requires JavaScript to run.</p>
      </div>
    </noscript>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
