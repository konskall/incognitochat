<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Updated favicons with relative paths.
         NOTE: favicon.svg was ~1 MB (an embedded raster) and modern browsers
         prefer the SVG, so it was downloaded on every first visit. Dropped in
         favour of the 17 KB PNG / ICO. -->
    <link rel="icon" type="image/png" href="./favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="./favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Incognito Chat" />
    <link rel="manifest" href="./site.webmanifest" />

    <!-- Open Graph Tags -->
    <meta property="og:title" content="Incognito Chat - Speak Free">
    <meta property="og:description" content="Real-time encrypted chat with PIN-based private rooms. Share freely, anonymously.">
    <meta property="og:image" content="https://konskall.github.io/incognitochat/og-incognito.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://konskall.github.io/incognitochat">

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Incognito Chat - Speak Free">
    <meta name="twitter:description" content="Real-time encrypted chat with PIN-based private rooms.">
    <meta name="twitter:image" content="https://konskall.github.io/incognitochat/og-incognito.png">

    <!-- LinkedIn Tags -->
    <meta property="linkedin:url" content="https://konskall.github.io/incognitochat/">
    <meta property="linkedin:title" content="Incognito Chat - Speak Free">
    <meta property="linkedin:description" content="Real-time encrypted chat with PIN-based private rooms">
    <meta property="linkedin:image" content="https://konskall.github.io/incognitochat/og-incognito.png">

    <meta property="og:locale" content="en_US">
    <meta name="author" content="KonsKall">
    <title id="pageTitle">Incognito Chat - Speak Free</title>
    <meta name="description" content="Real-time encrypted chat with PIN-based private rooms. Share freely, anonymously." />

    <!-- Optimized Google Fonts Loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" 
      rel="stylesheet"
      media="print" 
      onload="this.media='all'"
    >
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
      >
    </noscript>
    <!-- Warm up the avatar API origin (used on the login / dashboard / chat
         screens). Kept as dns-prefetch only so the landing — which has no
         avatars — doesn't open an unused connection. Previously these were
         trapped inside <noscript>, so they did nothing with JS enabled. -->
    <link rel="dns-prefetch" href="https://api.dicebear.com" />
    <!-- Preload the landing hero logo (LCP element). -->
    <link rel="preload" as="image" href="./favicon-96x96.png" fetchpriority="high" />
        <!-- PWA Install Prompt Capture - Must be before React loads -->
    <script>
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent the mini-infobar from appearing on mobile
        e.preventDefault();
        // Stash the event so it can be triggered later.
        window.deferredPrompt = e;
        // Dispatch a custom event so React knows it's ready
        window.dispatchEvent(new Event('pwa-ready'));
      });
    </script>
    <!-- Prevent White Flash on Load by Defaulting to Dark Mode -->
    <script>
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage))) {
        document.documentElement.classList.add('dark');
        document.querySelector("meta[name='theme-color']")?.setAttribute("content", "#020617");
      } else {
        document.documentElement.classList.remove('dark');
        document.querySelector("meta[name='theme-color']")?.setAttribute("content", "#f8fafc");
      }
    </script>
</head>
  <body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 antialiased selection:bg-primary-200 selection:text-primary-900">
    <div id="root" class="w-full"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
