name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

# Least privilege by default; the deploy job widens to what Pages needs.
permissions:
  contents: read

# Don't let overlapping pushes race a deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # npm ci (not install): reproducible, lockfile-pinned installs.
      - name: Install dependencies
        run: npm ci

      # Run the unit tests before shipping — CI never gated on them before.
      - name: Test
        run: npm test

      - name: Build
        env:
          API_KEY: ${{ secrets.API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only the deploy job needs to write Pages + mint the OIDC token.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
